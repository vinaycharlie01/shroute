name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.26"
  MAGE_VERSION: "v1.17.2"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=10m

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Test
        run: mage test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "*.xml"

  race:
    name: Race Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Race
        run: mage race

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Integration Test (k3s via testcontainers)
        run: mage integration

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Coverage
        run: mage coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Bench
        run: mage bench

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Cache govulncheck
        id: cache-govulncheck
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ hashFiles('go.sum') }}
      - name: Install govulncheck
        if: steps.cache-govulncheck.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        continue-on-error: true
        run: mage govulncheck
      - name: Trivy filesystem scan
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, integration]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Build binary
        run: mage build
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sh-mcp-go-binary
          path: dist/sh-mcp-go

  container:
    name: Container Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Build linux binaries
        run: mage buildLinux
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test, integration, race, security]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}
      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}
      - name: Release
        run: mage release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
