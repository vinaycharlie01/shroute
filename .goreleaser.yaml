version: 2

project_name: omnirouter

before:
  hooks:
    - go mod tidy

builds:
  - id: omnirouter
    main: ./backend/cmd/server
    binary: omnirouter
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/vinaycharlie01/shroute/backend/internal/version.Version={{.Version}}
      - -X github.com/vinaycharlie01/shroute/backend/internal/version.Commit={{.Commit}}
      - -X github.com/vinaycharlie01/shroute/backend/internal/version.BuildDate={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^ci:", "Merge pull request", "Merge branch"]

release:
  github:
    owner: vinaycharlie01
    name: shroute
