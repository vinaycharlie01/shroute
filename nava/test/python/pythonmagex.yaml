# Python configuration for ml-service
directory: .

# Setup configuration
setup:
  createVenv: true
  installRequirements: true

# Run service configuration (for Flask app)
runService:
  script: main.py
  args: []

# Run tests configuration
runTests:
  script: test_model.py
  args: []

# Linting configuration
runLint:
  linter: flake8
  args:
    - --max-line-length=120
    - .

# Format configuration
runFormat:
  args:
    - --line-length=120
    - .

# Clean configuration
clean:
  paths:
    - venv
    - __pycache__
    - "*.pyc"
    - .pytest_cache